<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Allura&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:'Playfair Display',serif;
background:#e6efe5;
}

/* PAGE */
.page{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:all 0.7s ease;
}

.page.active{
opacity:1;
}

/* CARD */
.card{
width:92vw;
max-width:420px;
aspect-ratio:3/4;
position:relative;
border-radius:12px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* CARD IMAGE */
.card img{
position:absolute;
width:100%;
height:100%;
object-fit:contain; /* keeps full design */
}

/* CONTENT POSITIONING (MATCH CARD) */
.content{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* GOLD TEXT */
.gold{
background: linear-gradient(
120deg,
#5a3d00,
#c9a646,
#fff2b0,
#c9a646,
#8a6d1f,
#fff2b0,
#c9a646
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 1px 0 rgba(255,255,255,0.4),
0 2px 3px rgba(0,0,0,0.25),
0 0 8px rgba(201,166,70,0.4);

background-size:200% auto;
animation:shine 6s linear infinite;
}

@keyframes shine{
0%{background-position:0%;}
100%{background-position:200%;}
}

/* PAGE 1 TITLE */
.invite{
font-family:'Great Vibes';
font-size:42px;
margin-top:10%;
}

/* NAMES PAGE */
.name-top,.name-bottom{
font-family:'Great Vibes';
font-size:46px;
}

.weds{
font-family:'Allura';
font-size:28px;
margin:6px 0;
}

/* VENUE TEXT */
.heading{
font-family:'Great Vibes';
font-size:38px;
margin-bottom:10px;
}

.details{
font-size:16px;
color:#6b1f2a;
line-height:2;
}

.date{color:#c9a646;font-size:18px;}
.button{
margin-top:15px;
padding:10px 18px;
background:#6b1f2a;
color:#fff;
border-radius:5px;
text-decoration:none;
}

/* NAV */
.nav{
position:absolute;
width:100%;
height:100%;
z-index:5;
}

</style>

<script>

let current=0;
const total=4;

function showPage(i){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.page')[i].classList.add('active');
}

function nextPage(){
current=(current+1)%total;
showPage(current);
}

function prevPage(){
current=(current-1+total)%total;
showPage(current);
}

function tapNav(e){
let x=e.clientX || e.touches[0].clientX;
let w=window.innerWidth;
if(x>w/2) nextPage();
else prevPage();
}

/* AUTO START */
window.onload=function(){
showPage(0);
setTimeout(()=>showPage(1),1500);
};

</script>

</head>

<body>

<!-- PAGE 1 -->
<div class="page">
<div class="nav" onclick="tapNav(event)"></div>
<div class="card">
<img src="PASTE_YOUR_CARD_IMAGE_URL_HERE">
<div class="content">
<div class="invite gold">Marriage Invitation</div>
</div>
</div>
</div>

<!-- PAGE 2 -->
<div class="page">
<div class="nav" onclick="tapNav(event)"></div>
<div class="card">
<img src="https://raw.githubusercontent.com/ravisri0124/sample/main/card.jpg">
<div class="content">
<div class="name-top gold">RaviChandu</div>
<div class="weds gold">weds</div>
<div class="name-bottom gold">Sridevi</div>
</div>
</div>
</div>

<!-- PAGE 3 -->
<div class="page">
<div class="nav" onclick="tapNav(event)"></div>
<div class="card">
<img src="PASTE_YOUR_CARD_IMAGE_URL_HERE">
<div class="content">
<div class="heading gold">Venue</div>
<div class="details">
<div class="date">13 May 2026</div>
<div>6:57 PM</div>
<div>Ammaji Kalyana Mandapam</div>
<div>Juvvalapalem, Kalla Mandal</div>
<a class="button" href="https://maps.app.goo.gl/nF1GkfJKyZCrqB3M8" target="_blank">View Location</a>
</div>
</div>
</div>
</div>

<!-- PAGE 4 -->
<div class="page">
<div class="nav" onclick="tapNav(event)"></div>
<div class="card">
<img src="PASTE_YOUR_CARD_IMAGE_URL_HERE">
<div class="content">
<div class="heading gold">Reception</div>
<div class="details">
<div class="date">17 May 2026</div>
<div>Raithu Sangha Bhavan</div>
<div>Velivennu, Undrajavaram Mandal</div>
<a class="button" href="https://maps.app.goo.gl/YkmVW6dPRa83GCdQ6" target="_blank">View Location</a>
</div>
</div>
</div>
</div>

</body>
</html>
