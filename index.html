<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Allura&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:'Playfair Display',serif;
background:#e6efe5;
}

/* PAGE BASE */
.page{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
display:flex;
justify-content:center;
align-items:center;

opacity:0;
transform:scale(1.05);
filter:blur(6px);

transition:
opacity 0.7s ease,
transform 0.7s ease,
filter 0.7s ease;
}

/* ACTIVE PAGE */
.page.active{
opacity:1;
transform:scale(1);
filter:blur(0);
z-index:2;
}

/* SLIDE EFFECT */
.page.slide-left{
transform:translateX(-40%) scale(0.98);
opacity:0;
}

.page.slide-right{
transform:translateX(40%) scale(0.98);
opacity:0;
}

/* CARD */
.card{
width:90vw;
max-width:420px;
aspect-ratio:3/4;
background:url('https://raw.githubusercontent.com/ravisri0124/sample/main/bg.jpg') no-repeat center;
background-size:cover;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
border-radius:8px;
overflow:hidden;
border:1px solid rgba(201,166,70,0.4);
}

.card::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(255,255,255,0.10);
}

/* CONTENT */
.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
text-align:center;
z-index:2;
}

/* TITLE */
.title{
font-family:'Great Vibes';
font-size:44px;
background:linear-gradient(90deg,#c9a646,#f5e6a3,#c9a646);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* NAMES */
.names{
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
}

.name-top,.name-bottom{
font-family:'Great Vibes';
font-size:48px;
color:#6b1f2a;
}

.weds{
font-family:'Allura',cursive;
font-size:30px;
color:#c9a646;
}

/* DETAILS */
.divider{
width:70px;
height:1px;
background:#c9a646;
margin:12px auto 18px;
}

.details{
line-height:2;
font-size:16px;
color:#6b1f2a;
}

.date{
font-size:20px;
color:#c9a646;
font-weight:600;
}

.time{ font-style:italic; }

.venue{ margin-top:10px; font-weight:600; }

.location{ font-size:14px; opacity:0.85; }

.button{
display:inline-block;
margin-top:18px;
padding:10px 20px;
background:#6b1f2a;
color:#fff;
border-radius:5px;
text-decoration:none;
}

/* NAV */
.nav{
position:absolute;
width:100%;
height:100%;
z-index:5;
}

</style>

<script>

let current = 0;
const total = 4;

/* SHOW PAGE */
function showPage(index, direction="fade"){

let pages = document.querySelectorAll('.page');

pages.forEach(p=>{
p.classList.remove('active','slide-left','slide-right');
});

/* APPLY DIRECTION */
if(direction === "left"){
pages[current].classList.add('slide-left');
}
if(direction === "right"){
pages[current].classList.add('slide-right');
}

current = index;

setTimeout(()=>{
pages[current].classList.add('active');
},50);
}

/* AUTO START */
function autoStart(){
setTimeout(()=>{
showPage(1,"fade");
},1500);
}

/* NEXT */
function nextPage(){

if(current === total-1){
showPage(0,"fade");
autoStart();
return;
}

showPage(current+1,"left");
}

/* PREV */
function prevPage(){
showPage((current-1+total)%total,"right");
}

/* TAP */
function tapNav(e){
let x = e.clientX || e.touches[0].clientX;
let w = window.innerWidth;

if(x > w/2){
nextPage();
}else{
prevPage();
}
}

/* SWIPE */
let startX = 0;

function touchStart(e){
startX = e.touches[0].clientX;
}

function touchEnd(e){
let endX = e.changedTouches[0].clientX;

if(startX - endX > 50) nextPage();
else if(endX - startX > 50) prevPage();
}

/* INIT */
window.onload = function(){
document.querySelectorAll('.page')[0].classList.add('active');
autoStart();
};

</script>

</head>

<body>

<!-- PAGE 1 -->
<div class="page">
<div class="nav" onclick="tapNav(event)" ontouchstart="touchStart(event)" ontouchend="touchEnd(event)"></div>
<div class="card">
<div class="content">
<div class="title">Marriage Invitation</div>
</div>
</div>
</div>

<!-- PAGE 2 -->
<div class="page">
<div class="nav" onclick="tapNav(event)" ontouchstart="touchStart(event)" ontouchend="touchEnd(event)"></div>
<div class="card">
<div class="content">
<div class="names">
<div class="name-top">RaviChandu</div>
<div class="weds">weds</div>
<div class="name-bottom">Sridevi</div>
</div>
</div>
</div>
</div>

<!-- PAGE 3 -->
<div class="page">
<div class="nav" onclick="tapNav(event)" ontouchstart="touchStart(event)" ontouchend="touchEnd(event)"></div>
<div class="card">
<div class="content">
<div class="title">Venue</div>
<div class="divider"></div>
<div class="details">
<div class="date">13 May 2026</div>
<div class="time">6:57 PM</div>
<div class="venue">Ammaji Kalyana Mandapam</div>
<div class="location">Juvvalapalem, Kalla Mandal</div>
<a class="button" href="https://maps.app.goo.gl/nF1GkfJKyZCrqB3M8" target="_blank">View Location</a>
</div>
</div>
</div>
</div>

<!-- PAGE 4 -->
<div class="page">
<div class="nav" onclick="tapNav(event)" ontouchstart="touchStart(event)" ontouchend="touchEnd(event)"></div>
<div class="card">
<div class="content">
<div class="title">Reception</div>
<div class="divider"></div>
<div class="details">
<div class="date">17 May 2026</div>
<div class="venue">Raithu Sangha Bhavan</div>
<div class="location">Velivennu, Undrajavaram Mandal</div>
<a class="button" href="https://maps.app.goo.gl/YkmVW6dPRa83GCdQ6" target="_blank">View Location</a>
</div>
</div>
</div>
</div>

</body>
</html>
