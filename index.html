<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Allura&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:'Playfair Display',serif;
background:#e6efe5;
}

/* PAGE */
.page{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:0.6s ease;
}

.page.active{
opacity:1;
z-index:2;
}

/* CARD */
.card{
width:92vw;
max-width:420px;
aspect-ratio:3/4;
position:relative;
border-radius:14px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

/* IMAGE */
.card img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transition: transform 6s ease;
}

.page.active .card img{
transform: scale(1.05);
}

/* CONTENT (FIXED - no background box) */
.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:82%;
text-align:center;
z-index:2;
pointer-events:auto;
}

/* NAV */
.nav{
position:absolute;
width:100%;
height:100%;
z-index:1;
}

/* GOLD EFFECT */
.gold{
background: linear-gradient(
120deg,
#3a2a00,
#d4af37,
#fff8dc,
#d4af37,
#7a5c00
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 1px 0 rgba(255,255,255,0.5),
0 2px 4px rgba(0,0,0,0.4),
0 0 8px rgba(212,175,55,0.4);

background-size:200% auto;
animation:shine 7s linear infinite;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:200%}
}

/* TYPOGRAPHY */
.invite{
font-family:'Great Vibes';
font-size:44px;
}

.names{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.name-top,.name-bottom{
font-family:'Great Vibes';
font-size:48px;
}

.weds{
font-family:'Allura';
font-size:28px;
}

/* HEADINGS */
.heading{
font-family:'Great Vibes';
font-size:40px;
margin-bottom:12px;
}

/* DETAILS */
.details{
font-size:15px;
line-height:2;
color:#ffffff;
text-shadow:0 2px 6px rgba(0,0,0,0.5);
}

.date{
font-size:20px;
font-weight:600;
margin-bottom:4px;
}

.time{
font-style:italic;
margin-bottom:6px;
}

.venue{
font-weight:600;
margin-top:8px;
}

.location{
font-size:14px;
opacity:0.9;
}

/* BUTTON */
.button{
margin-top:16px;
padding:10px 20px;
background:#7a1f2b;
color:#fff;
border-radius:6px;
text-decoration:none;
display:inline-block;
font-size:14px;
z-index:10;
position:relative;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

.button:hover{
background:#922838;
}

</style>

<script>

let current=0;
const total=4;
let autoSlideInterval=null;

let touchStartX=0;
let touchEndX=0;
let touchStartY=0;
let touchEndY=0;
const minSwipeDistance=50;

function showPage(i){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.page')[i].classList.add('active');
resetAutoSlide();
}

function nextPage(){
current=(current+1)%total;
showPage(current);
}

function prevPage(){
current=(current-1+total)%total;
showPage(current);
}

function startAutoSlide(){
autoSlideInterval=setInterval(()=>{ nextPage(); },5000);
}

function resetAutoSlide(){
if(autoSlideInterval){ clearInterval(autoSlideInterval); }
startAutoSlide();
}

function tapNav(e){
if(e.target.closest('.button')) return;

let x=e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : null);
if(!x) return;

let w=window.innerWidth;

if(x>w/2) nextPage();
else prevPage();
}

/* SWIPE */
function handleTouchStart(e){
if(e.target.closest('.button')) return;

touchStartX=e.touches[0].clientX;
touchStartY=e.touches[0].clientY;
touchEndX=touchStartX;
touchEndY=touchStartY;
}

function handleTouchMove(e){
if(e.target.closest('.button')) return;

touchEndX=e.touches[0].clientX;
touchEndY=e.touches[0].clientY;
}

function handleTouchEnd(e){
if(e.target.closest('.button')) return;

const horizontalDistance=touchEndX-touchStartX;
const verticalDistance=Math.abs(touchEndY-touchStartY);

if(verticalDistance<Math.abs(horizontalDistance)){
if(horizontalDistance>minSwipeDistance){
prevPage();
}else if(horizontalDistance<-minSwipeDistance){
nextPage();
}
}
}

window.onload=function(){
showPage(0);
startAutoSlide();

document.querySelectorAll('.nav').forEach(nav=>{
nav.addEventListener('touchstart',handleTouchStart,false);
nav.addEventListener('touchmove',handleTouchMove,false);
nav.addEventListener('touchend',handleTouchEnd,false);
});
};

</script>

</head>

<body>

<!-- PAGE 1 -->
<div class="page active">
<div class="nav" onclick="tapNav(event)"></div>
<div class="card">
<img src="https://raw.githubusercontent.com/ravisri0124/sample/main/card.jpg">
<div class="content">
<div class="invite gold">Marriage Invitation</div>
</div>
</div>
</div>

<!-- PAGE 2 -->
<div class="page">
<div class="nav" onclick="tapNav(event)"></div>
<div class="card">
<img src="https://raw.githubusercontent.com/ravisri0124/sample/main/card.jpg">
<div class="content">
<div class="names gold">
<div class="name-top">RaviChandu</div>
<div class="weds">weds</div>
<div class="name-bottom">Sridevi</div>
</div>
</div>
</div>
</div>

<!-- PAGE 3 -->
<div class="page">
<div class="nav" onclick="tapNav(event)"></div>
<div class="card">
<img src="https://raw.githubusercontent.com/ravisri0124/sample/main/card.jpg">
<div class="content">
<div class="heading gold">Venue</div>
<div class="details">
<div class="date gold">13 May 2026</div>
<div class="time">6:57 PM</div>
<div class="venue">Ammaji Kalyana Mandapam</div>
<div class="location">Juvvalapalem, Kalla Mandal</div>
<a class="button" href="https://maps.app.goo.gl/nF1GkfJKyZCrqB3M8" target="_blank">View Location</a>
</div>
</div>
</div>
</div>

<!-- PAGE 4 -->
<div class="page">
<div class="nav" onclick="tapNav(event)"></div>
<div class="card">
<img src="https://raw.githubusercontent.com/ravisri0124/sample/main/card.jpg">
<div class="content">
<div class="heading gold">Reception</div>
<div class="details">
<div class="date gold">17 May 2026</div>
<div class="venue">Raithu Sangha Bhavan</div>
<div class="location">Velivennu, Undrajavaram Mandal</div>
<a class="button" href="https://maps.app.goo.gl/YkmVW6dPRa83GCdQ6" target="_blank">View Location</a>
</div>
</div>
</div>
</div>

</body>
</html>
